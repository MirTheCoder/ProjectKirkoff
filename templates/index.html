<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50 text-slate-800 antialiased">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirchoff Affordable Housing Site Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places" async></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="flex flex-col h-full font-['Inter',_sans-serif]">

  <header class="flex items-center justify-between bg-slate-900 text-white px-6 py-3 shadow-md z-40 shrink-0">
    <div class="flex items-center gap-3">
      <div class="text-3xl bg-blue-600/20 text-blue-400 p-2 rounded-xl border border-blue-500/30">⌂</div>
      <div>
        <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent">Affordable Housing Site Finder</h1>
        <p class="text-xs font-semibold text-blue-400 tracking-wider uppercase">Connecticut</p>
      </div>
    </div>

    <div class="flex items-center max-w-xl w-full mx-6 relative">
      <div class="absolute left-3 text-slate-400 pointer-events-none">🔍</div>
      <input id="searchInput"
             type="text"
             placeholder="Search by address, city, ZIP code, or property ID..."
             class="w-full pl-9 pr-24 py-2 bg-slate-800 text-slate-100 placeholder-slate-400 text-sm border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" />
      <button onclick="loadProperties()"
              class="absolute right-1.5 top-1.5 bottom-1.5 px-4 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded-md shadow-sm transition-colors">
        Search
      </button>
    </div>

    <nav class="flex items-center gap-3">
      <button onclick="openAddPropertyModal()"
              class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 rounded-lg shadow-sm transition-all"
              title="Add a new property listing">
        <span class="text-emerald-400 text-sm font-bold">+</span> Add Property
      </button>
      <button onclick="openSavedPanel()"
              class="px-3 py-1.5 text-xs font-semibold bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 rounded-lg shadow-sm transition-all">
        ☆ Saved
      </button>
      <button onclick="openStatsModal()"
              class="px-3 py-1.5 text-xs font-semibold bg-emerald-950 hover:bg-emerald-900/80 text-emerald-300 border border-emerald-500/30 rounded-lg shadow-sm transition-all"
              title="Database stats dashboard">
        📊 DB Stats
      </button>
      <button class="relative p-2 text-slate-400 hover:text-white bg-slate-800 border border-slate-700 rounded-lg transition-colors">
        🔔 <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center bg-rose-600 text-[10px] font-bold text-white rounded-full">3</span>
      </button>

      <div class="flex items-center gap-2.5 bg-slate-800/60 border border-slate-700/50 pl-2.5 pr-4 py-1 rounded-full">
        <div class="h-7 w-7 flex items-center justify-center bg-blue-600 rounded-full font-bold text-xs text-white shadow-inner">PJ</div>
        <div class="flex flex-col text-left leading-none">
          <span class="text-xs font-bold text-slate-200">Demo User</span>
          <span class="text-[10px] text-slate-400 mt-0.5">Acquisition Team</span>
        </div>
      </div>
    </nav>
  </header>

  <main class="flex flex-1 min-h-0 overflow-hidden relative">

    <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm overflow-y-auto">
      <div class="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
        <h2 class="text-sm font-bold uppercase tracking-wider text-slate-500">Filters</h2>
        <button onclick="resetFilters()" class="text-xs font-semibold text-blue-600 hover:text-blue-500 transition-colors flex items-center gap-1">
          ↻ Reset All
        </button>
      </div>

      <div class="p-4 flex flex-col gap-5">
        <div>
          <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wide">Location</label>
          <input id="locationInput" type="text" placeholder="Enter city, town, or ZIP code"
                 class="w-full p-2 text-sm border border-slate-200 rounded-lg bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-1 focus:ring-blue-500 transition-all" />
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wide">Price Range ($)</label>
          <div class="grid grid-cols-2 gap-2">
            <input id="minPrice" type="number" value="100000" class="w-full p-2 text-sm border border-slate-200 rounded-lg bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-1 focus:ring-blue-500 transition-all" />
            <input id="maxPrice" type="number" value="5000000" class="w-full p-2 text-sm border border-slate-200 rounded-lg bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-1 focus:ring-blue-500 transition-all" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wide">Property Size (Acres)</label>
          <div class="grid grid-cols-2 gap-2">
            <input id="minAcres" type="number" step="0.1" value="0.5" class="w-full p-2 text-sm border border-slate-200 rounded-lg bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-1 focus:ring-blue-500 transition-all" />
            <input id="maxAcres" type="number" step="0.1" value="20" class="w-full p-2 text-sm border border-slate-200 rounded-lg bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-1 focus:ring-blue-500 transition-all" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wide">Zoning Type</label>
          <select id="zoningFilter" class="w-full p-2 text-sm border border-slate-200 rounded-lg bg-slate-50/50 focus:outline-none focus:border-blue-500 focus:bg-white focus:ring-1 focus:ring-blue-500 transition-all">
            <option value="any">Any zoning type</option>
            <option value="Residential">Residential</option>
            <option value="Mixed Use">Mixed Use</option>
            <option value="Commercial">Commercial</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wide">QCT / DDA Status</label>
          <div class="grid grid-cols-4 p-1 bg-slate-100 rounded-xl border border-slate-200/40">
            <button data-value="any" class="py-1 text-xs font-semibold rounded-lg transition-all focus:outline-none" onclick="setSegment('qctFilter',this)">Any</button>
            <button data-value="qct" class="py-1 text-xs font-semibold rounded-lg transition-all focus:outline-none" onclick="setSegment('qctFilter',this)">QCT</button>
            <button data-value="dda" class="py-1 text-xs font-semibold rounded-lg transition-all focus:outline-none" onclick="setSegment('qctFilter',this)">DDA</button>
            <button data-value="none" class="py-1 text-xs font-semibold rounded-lg transition-all focus:outline-none" onclick="setSegment('qctFilter',this)">None</button>
          </div>
          <input type="hidden" id="qctFilter" value="any" />
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase tracking-wide">Terrain Slope</label>
          <div class="grid grid-cols-2 gap-2">
            <button data-value="any" class="p-2 text-xs font-semibold text-center border border-slate-200 rounded-xl transition-all hover:bg-slate-50 focus:outline-none" onclick="setSegment('terrainFilter',this)">Any</button>
            <button data-value="flat" class="p-2 text-xs font-semibold text-center border border-slate-200 rounded-xl transition-all hover:bg-slate-50 focus:outline-none" onclick="setSegment('terrainFilter',this)">Flat<br><span class="text-[10px] text-slate-400 font-normal">0-5%</span></button>
            <button data-value="moderate" class="p-2 text-xs font-semibold text-center border border-slate-200 rounded-xl transition-all hover:bg-slate-50 focus:outline-none" onclick="setSegment('terrainFilter',this)">Mod.<br><span class="text-[10px] text-slate-400 font-normal">5-15%</span></button>
            <button data-value="steep" class="p-2 text-xs font-semibold text-center border border-slate-200 rounded-xl transition-all hover:bg-slate-50 focus:outline-none" onclick="setSegment('terrainFilter',this)">Steep<br><span class="text-[10px] text-slate-400 font-normal">15%+</span></button>
          </div>
          <input type="hidden" id="terrainFilter" value="any" />
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 mb-2 uppercase tracking-wide">Map Overlays</label>
          <div class="flex flex-col gap-2.5 bg-slate-50 p-3 border border-slate-200/60 rounded-xl">
            <label class="flex items-center justify-between text-xs font-medium text-slate-600 cursor-pointer select-none">
              <span>QCT Areas</span>
              <input id="qctLayerToggle" type="checkbox" checked onchange="toggleLayers()" class="h-4 w-4 accent-blue-600 cursor-pointer">
            </label>
            <label class="flex items-center justify-between text-xs font-medium text-slate-600 cursor-pointer select-none">
              <span>DDA Areas</span>
              <input id="ddaLayerToggle" type="checkbox" checked onchange="toggleLayers()" class="h-4 w-4 accent-blue-600 cursor-pointer">
            </label>
            <label class="flex items-center justify-between text-xs font-medium text-slate-600 cursor-pointer select-none">
              <span>Flood Zones</span>
              <input id="floodLayerToggle" type="checkbox" checked onchange="toggleLayers()" class="h-4 w-4 accent-blue-600 cursor-pointer">
            </label>
            <label class="flex items-center justify-between text-xs font-medium text-slate-600 cursor-pointer select-none">
              <span>Terrain / Slope</span>
              <input id="terrainLayerToggle" type="checkbox" checked onchange="toggleLayers()" class="h-4 w-4 accent-blue-600 cursor-pointer">
            </label>
          </div>
        </div>

        <div class="flex flex-col gap-2 mt-2">
          <button onclick="loadProperties()"
                  class="w-full py-2.5 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold text-sm rounded-xl shadow-md transition-colors shadow-blue-500/10">
            Apply Filters
          </button>
          <button onclick="saveSearchDemo()"
                  class="w-full py-2.5 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold text-sm rounded-xl shadow-sm transition-colors">
            ▱ Save Search
          </button>
        </div>
      </div>
    </aside>

    <section class="flex-1 flex flex-col min-w-0 bg-slate-100 p-4 gap-4 overflow-y-auto">

      <div class="relative h-[420px] rounded-2xl shadow-sm border border-slate-200 overflow-hidden shrink-0">
        <div class="absolute top-3 left-3 right-3 flex items-center gap-2 z-30 pointer-events-none">
          <div class="flex items-center gap-4 bg-white/95 backdrop-blur-sm px-4 py-2 border border-slate-200 rounded-xl shadow-md pointer-events-auto">
            <span class="flex items-center gap-1.5 text-xs font-semibold text-slate-600"><span class="h-2.5 w-2.5 bg-purple-500 rounded-full inline-block animate-pulse"></span>QCT</span>
            <span class="flex items-center gap-1.5 text-xs font-semibold text-slate-600"><span class="h-2.5 w-2.5 bg-orange-500 rounded-full inline-block animate-pulse"></span>DDA</span>
            <span class="flex items-center gap-1.5 text-xs font-semibold text-slate-600"><span class="h-2.5 w-2.5 bg-blue-500 rounded-full inline-block animate-pulse"></span>Flood</span>
            <span class="flex items-center gap-1.5 text-xs font-semibold text-slate-600"><span class="h-2.5 w-2.5 bg-emerald-500 rounded-full inline-block animate-pulse"></span>Terrain</span>
          </div>

          <div class="ml-auto flex gap-1 bg-white/95 backdrop-blur-sm p-1 border border-slate-200 rounded-xl shadow-md pointer-events-auto">
            <button class="px-2.5 py-1 text-xs font-bold rounded-lg transition-all focus:outline-none" onclick="setMapStyle('street',this)">🗺 Street</button>
            <button class="px-2.5 py-1 text-xs font-bold rounded-lg transition-all focus:outline-none" onclick="setMapStyle('satellite',this)">🛰 Satellite</button>
            <button class="px-2.5 py-1 text-xs font-bold rounded-lg transition-all focus:outline-none" onclick="setMapStyle('terrain',this)">⛰ Terrain</button>
          </div>
        </div>
        <div id="map" class="h-full w-full z-10"></div>
      </div>

      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col min-h-[300px] overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/40">
          <span id="countLabel" class="text-sm font-bold text-slate-700">Loading properties...</span>
          <span class="text-xs font-medium text-slate-400">Last updated: May 24, 2026 10:30 AM</span>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm border-collapse">
            <thead>
              <tr class="bg-slate-50 text-slate-500 text-xs font-bold uppercase tracking-wider border-b border-slate-200/80">
                <th class="px-5 py-3">Address</th>
                <th class="px-4 py-3">City/Town</th>
                <th class="px-4 py-3">Price</th>
                <th class="px-4 py-3">Size</th>
                <th class="px-4 py-3">QCT/DDA</th>
                <th class="px-4 py-3">Utilities</th>
                <th class="px-4 py-3">Terrain</th>
                <th class="px-4 py-3">Feasibility</th>
                <th class="px-5 py-3 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="propertyRows" class="divide-y divide-slate-100 text-slate-700 font-medium">
              </tbody>
          </table>
        </div>
      </div>
    </section>

    <aside id="detailsPanel" class="w-96 bg-white border-l border-slate-200 shadow-xl transition-all hidden z-30"></aside>
  </main>

  <div id="modalLayer" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden"></div>
  <div id="toast" class="fixed bottom-5 right-5 bg-slate-900 text-white text-sm font-semibold px-4 py-3 rounded-xl shadow-2xl border border-slate-800 z-50 hidden transition-all max-w-sm"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
